<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#3DDC84"/>
  
  <!-- Android body -->
  <g transform="translate(128, 128)">
    <!-- Head -->
    <rect x="-35" y="-65" width="70" height="50" rx="15" fill="white"/>
    
    <!-- Eyes -->
    <circle cx="-12" cy="-45" r="8" fill="#3DDC84"/>
    <circle cx="12" cy="-45" r="8" fill="#3DDC84"/>
    
    <!-- Antenna -->
    <line x1="-20" y1="-65" x2="-20" y2="-85" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="-65" x2="20" y2="-85" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-20" cy="-88" r="4" fill="white"/>
    <circle cx="20" cy="-88" r="4" fill="white"/>
    
    <!-- Body -->
    <rect x="-30" y="-10" width="60" height="70" rx="10" fill="white"/>
    
    <!-- Arms -->
    <rect x="-50" y="-5" width="20" height="40" rx="10" fill="white"/>
    <rect x="30" y="-5" width="20" height="40" rx="10" fill="white"/>
    
    <!-- Legs -->
    <rect x="-20" y="60" width="15" height="25" rx="7" fill="white"/>
    <rect x="5" y="60" width="15" height="25" rx="7" fill="white"/>
    
    <!-- Capsule integrated into chest -->
    <g transform="translate(0, 10)">
      <!-- Capsule body -->
      <rect x="-15" y="-8" width="30" height="16" rx="8" fill="#FF6B6B"/>
      <!-- Capsule highlight -->
      <rect x="-13" y="-6" width="26" height="4" rx="2" fill="#FF8E8E" opacity="0.7"/>
      <!-- Capsule line in middle -->
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Glow effect -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#3DDC84" stroke-width="2" opacity="0.3"/>
</svg>